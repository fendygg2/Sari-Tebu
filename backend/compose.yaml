name: sari-tebu-production
services:
    database:
        image: mysql:8.4
        container_name: sari-tebu-database
        restart: always
        env_file:
            - .env.prod
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 5s
            timeout: 20s
            retries: 10
            start_period: 30s

    server:
        container_name: sari-tebu-server
        build:
            context: .
            dockerfile: Dockerfile
        env_file:
            - .env.prod
        ports:
            - "${PORT:-8080}:${PORT:-8080}"
        depends_on:
            database:
                condition: service_healthy

    caddy:
        image: caddy:2.11-alpine
        restart: unless-stopped
        ports:
            - "80:80"
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile

volumes:
    mysql_data:
