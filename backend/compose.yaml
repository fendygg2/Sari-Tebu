name: sari-tebu-production
services:
    database:
        image: mysql:8.4
        container_name: sari-tebu-database
        restart: always
        env_file:
            - .env.prod
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 5s
            timeout: 20s
            retries: 10
            start_period: 30s

    server:
        build:
            context: .
            dockerfile: Dockerfile
        env_file:
            - .env.prod
        expose:
            - "${PORT:-8080}"
        depends_on:
            database:
                condition: service_healthy
    
    caddy:
        image: caddy:alpine
        container_name: sari-tebu-reverse-proxy
        ports:
            - "80:80"
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
        depends_on:
            - server
        restart: always

volumes:
    mysql_data: