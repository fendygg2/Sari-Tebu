name: sari-tebu-development
services:
    database:
        image: mysql:8.4
        container_name: mysql8.4
        restart: unless-stopped
        environment:
            - MYSQL_ROOT_PASSWORD=root
        ports:
            - "3306:3306"
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 5s
            timeout: 20s
            retries: 10
            start_period: 30s

    adminer:
        image: adminer
        container_name: adminer
        restart: unless-stopped
        ports:
            - "9000:8080"
        depends_on:
            database:
                condition: service_healthy
