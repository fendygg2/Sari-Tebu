name: sari-tebu-production
services:
    # NOTE: karena database hanya dapat berkomukasi antar container lain,
    #       membiarkan nya sebagai root sudah cukup aman.
    database:
        image: mysql:8.4
        container_name: sari-tebu-database
        restart: unless-stopped
        environment:
            - MYSQL_ROOT_PASSWORD=root
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 5s
            timeout: 20s
            retries: 10
            start_period: 30s

    server:
        build:
            context: ../backend
            dockerfile: Dockerfile
        restart: unless-stopped
        env_file:
            - ../backend/.env.prod
        expose:
            - "8080"
        depends_on:
            database:
                condition: service_healthy

    frontend:
        build:
            context: ../frontend
            dockerfile: Dockerfile
        restart: unless-stopped
        env_file:
            - ../frontend/.env.prod
        expose:
            - "5173"
    
    caddy:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: sari-tebu-reverse-proxy
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
            - "443:443/udp"
        env_file:
            - ./.env.prod
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
        depends_on:
            - server
            - frontend

volumes:
    mysql_data:
    caddy_data:
    caddy_config: